<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DJP Design - Daniël Prins</title>
<meta name="description" content="Portfolio van Daniël Prins - Communication & Multimedia Design student. Een interactieve macOS-desktop." />
<link rel="icon" type="image/png" href="assets/favicon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   DJP DESIGN - portfolio als interactieve macOS-desktop
   ========================================================================== */
:root{
  --wall-1:#1f8f4e; --wall-2:#39c46e; --wall-3:#0c6b39;
  --accent:#1f8f4e;
  --ink:#16233f;
  --win:#f6f7f9;
  --red:#ff5f57; --yellow:#febc2e; --green:#28c840; --status-blue:#1f6bff;
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --shadow-win:0 24px 70px rgba(8,50,25,.32), 0 2px 10px rgba(8,50,25,.18);
  --r-win:14px;
  --ease:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:var(--font); color:var(--ink);
  background:var(--wall-1) url("assets/wallpaper.jpg") center/cover no-repeat fixed;
  overflow:hidden; -webkit-font-smoothing:antialiased;
  user-select:none;
}
img{ display:block; max-width:100%; }
button{ font:inherit; border:0; background:none; cursor:pointer; color:inherit; }
a{ color:inherit; }

#scene{ position:relative; height:100%; }

#mac{ position:relative; z-index:2; width:100%; height:100%; overflow:hidden; }
.wallpaper{ position:absolute; inset:0;
  background:var(--wall-1) url("assets/wallpaper.jpg") center/cover no-repeat; }
.wallpaper .aurora{ display:none; }
@keyframes au1{ from{ transform:translate(0,0) scale(1);} to{ transform:translate(10%,8%) scale(1.15);} }
@keyframes au2{ from{ transform:translate(0,0) rotate(0);} to{ transform:translate(-8%,-10%) rotate(12deg);} }

.menubar{
  position:absolute; top:0; left:0; right:0; height:34px; z-index:400;
  display:flex; align-items:center; justify-content:space-between; padding:0 14px;
  background:rgba(255,255,255,.14); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  color:#fff; font-size:.8rem;
}
.menubar .left{ font-weight:700; display:flex; align-items:center; gap:8px; }
.menubar .left .logo{ height:13px; width:auto; opacity:.95; }
.menubar .right{ display:flex; align-items:center; gap:18px; }
.menubar .right a{ text-decoration:none; color:#fff; font-weight:500; opacity:.92; }
.menubar .right a:hover{ opacity:1; text-decoration:underline; text-underline-offset:3px; }
.menubar .clock{ font-variant-numeric:tabular-nums; opacity:.85; }

.widget{
  position:absolute; top:54px; left:22px; z-index:5; width:min(340px,72%);
  padding:18px 20px 20px; border-radius:18px;
  background:rgba(255,255,255,.16); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.28); color:#fff; box-shadow:0 18px 50px rgba(8,50,25,.22);
}
.widget .avatar{
  width:46px; height:46px; border-radius:50%; margin-bottom:12px; object-fit:cover;
  box-shadow:0 0 0 2px rgba(255,255,255,.5);
}
.widget h2{ font-size:1.05rem; font-weight:700; }
.widget p{ margin-top:6px; font-size:.85rem; line-height:1.45; opacity:.92; }
.widget .status{ margin-top:12px; display:flex; align-items:center; gap:8px; font-size:.8rem; font-weight:500; }
.widget .status::before{ content:""; width:10px; height:10px; border-radius:50%; background:var(--status-blue); box-shadow:0 0 14px rgba(31,117,255,.55); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse{ 50%{ opacity:.6; } }
/* sluitknop op de widget */
.widget-close{
  position:absolute; top:12px; right:12px; width:22px; height:22px; border-radius:50%;
  display:grid; place-items:center; font-size:.7rem; color:#fff;
  background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3);
  opacity:0; transition:opacity .2s, background .2s; cursor:pointer;
}
.widget:hover .widget-close{ opacity:1; }
.widget-close:hover{ background:rgba(255,255,255,.35); }
/* profiel-bubble (verborgen tot widget gesloten is) */
.profile-bubble{
  position:absolute; top:46px; left:22px; z-index:5;
  width:50px; height:50px; border-radius:50%; padding:0; overflow:hidden;
  border:2px solid rgba(255,255,255,.6); box-shadow:0 10px 26px rgba(8,50,25,.3);
  display:none; cursor:pointer; transition:transform .25s var(--ease);
}
.profile-bubble img{ width:100%; height:100%; object-fit:cover; }
.profile-bubble:hover{ transform:scale(1.08); }
body.widget-collapsed .widget{ display:none; }
body.widget-collapsed .profile-bubble{ display:block; }

.dicon{
  position:absolute; z-index:4; width:92px;
  display:flex; flex-direction:column; align-items:center; gap:7px;
  color:#fff; font-size:.76rem; font-weight:500; text-align:center;
  cursor:pointer; border-radius:10px; padding:8px 4px;
}
.dicon:hover{ background:rgba(255,255,255,.12); }
.dicon .ic{
  width:62px; height:50px; position:relative;
  transition:transform .25s var(--ease);
  filter:drop-shadow(0 8px 14px rgba(8,40,20,.35));
  display:grid; place-items:center;
}
.dicon:hover .ic{ transform:scale(1.08) translateY(-2px); }
.dicon .lbl{ text-shadow:0 1px 6px rgba(8,40,20,.6); }
.folder{ width:62px; height:50px; position:relative; }
.folder .tab{
  position:absolute; top:0; left:5px; width:26px; height:12px; border-radius:6px 8px 0 0;
  background:#6fc0f2;
}
.folder .back{
  position:absolute; left:0; right:0; top:6px; bottom:0; border-radius:8px;
  background:linear-gradient(180deg,#7fc6f5,#4aa3e8);
}
.folder .front{
  position:absolute; left:0; right:0; bottom:0; top:13px; border-radius:8px;
  background:linear-gradient(180deg,#b3e0fb,#7cc2f2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}
/* document-icoon (voor Credits) */
.doc{ width:42px; height:52px; position:relative; margin:0 auto;
  background:#fdfdfd; border-radius:5px 5px 6px 6px;
  box-shadow:0 6px 14px rgba(8,40,20,.3), inset 0 0 0 1px rgba(20,35,70,.06);
}
.doc .corner{ position:absolute; top:0; right:0; width:13px; height:13px;
  background:linear-gradient(135deg,#e3e8ef 50%, #fdfdfd 50%); border-top-right-radius:5px; }
.doc .ln{ position:absolute; left:7px; right:7px; height:3px; border-radius:2px; background:#c7cfdb; }
.doc .ln:nth-of-type(1){ top:20px; } .doc .ln:nth-of-type(2){ top:28px; } .doc .ln.short{ top:36px; right:18px; }

.window{
  position:absolute; z-index:10; min-width:240px;
  max-height:calc(100% - 130px);
  background:var(--win); border-radius:var(--r-win); box-shadow:var(--shadow-win);
  display:flex; flex-direction:column; overflow:hidden; will-change:transform,left,top;
}
.window.dark{ background:#23272f; color:#f0f2f6; }
.titlebar{
  position:relative;
  height:42px; flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:0 14px; cursor:grab;
  background:rgba(255,255,255,.65); backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(20,35,70,.08); font-size:.86rem; font-weight:600;
}
.window.dark .titlebar{ background:rgba(35,39,47,.9); border-color:rgba(255,255,255,.07); }
.titlebar:active{ cursor:grabbing; }
.lights{ display:flex; gap:7px; }
.lights button{ width:12px; height:12px; border-radius:50%; padding:0; position:relative; transition:filter .15s; }
.lights .l-close{ background:var(--red);} .lights .l-min{ background:var(--yellow);} .lights .l-max{ background:var(--green);}
.lights button:hover{ filter:brightness(.85); }
.lights button span{ position:absolute; inset:0; display:grid; place-items:center; font-size:9px; line-height:1; color:rgba(0,0,0,.55); opacity:0; font-weight:700; text-align:center; }
.window:hover .lights button span{ opacity:1; }
.titlebar .t-title{ position:absolute; left:50%; top:50%; transform:translate(-50%, -50%); width:calc(100% - 140px); text-align:center; opacity:.85; pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.titlebar .t-tools{ display:flex; gap:8px; margin-left:auto; }
.titlebar .t-tools button{ width:26px; height:26px; border-radius:8px; display:grid; place-items:center; font-size:.85rem; color:inherit; opacity:.7; }
.titlebar .t-tools button:hover{ background:rgba(20,35,70,.08); opacity:1; }
.window.dark .t-tools button:hover{ background:rgba(255,255,255,.1); }
.win-body{ flex:1; overflow:auto; }
.window.focused{ box-shadow:0 34px 90px rgba(8,50,25,.45), 0 2px 10px rgba(8,50,25,.2); }

.proj-cols{
  display:grid; grid-template-columns:1fr 150px 80px; padding:8px 18px;
  font-size:.74rem; font-weight:600; color:#7a86a0; border-bottom:1px solid rgba(20,35,70,.08);
  position:sticky; top:0; background:var(--win); z-index:1;
}
.proj-cols span:nth-child(2), .proj-cols span:nth-child(3){ text-align:center; }
.proj-row{ display:grid; grid-template-columns:1fr 150px 80px; align-items:center; padding:8px 18px; font-size:.85rem; cursor:pointer; }
.proj-row .dim{ text-align:center; }
.proj-row:nth-child(odd){ background:rgba(20,35,70,.035); }
.proj-row:hover{ background:rgba(31,143,78,.12); }
.proj-row.active{ background:var(--accent); color:#fff; }
.proj-row .nm{ display:flex; align-items:center; gap:10px; font-weight:500; }
.proj-row .mini{ width:28px; height:28px; border-radius:7px; flex:0 0 auto; object-fit:cover; box-shadow:inset 0 1px 0 rgba(255,255,255,.5); background-size:cover; background-position:center; }
.proj-row .dim{ color:#7a86a0; font-size:.78rem; }
.proj-row.active .dim{ color:rgba(255,255,255,.85); }
@media(max-width:680px){
  .proj-cols, .proj-row{ grid-template-columns:1fr 70px; }
  .proj-cols span:nth-child(2), .proj-row .dim:nth-of-type(1){ display:none; }
}

.prev-art{ position:relative; background:#e9ecf1; display:grid; place-items:center; min-height:200px; }
.prev-art img{ width:100%; height:auto; display:block; max-height:70vh; object-fit:contain; }
.prev-art video{ width:100%; height:auto; display:block; max-height:70vh; background:#000; }
.prev-nav{ display:flex; gap:4px; }
.prev-nav button{ width:26px; height:26px; border-radius:8px; opacity:.75; }
.prev-nav button:hover{ background:rgba(20,35,70,.08); opacity:1; }
.prev-multi{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding:10px; }
.prev-multi .prev-art{ min-height:150px; overflow:hidden; border-radius:14px; }
.prev-multi .prev-art img{ width:100%; height:100%; object-fit:cover; display:block; }
.prev-figma{ padding:14px 18px; background:#fff; border-top:1px solid rgba(20,35,70,.08); font-size:.85rem; }
.prev-figma a{ color:var(--accent); font-weight:600; text-decoration:none; }
.prev-figma a:hover{ text-decoration:underline; }
.ill-info{ padding:18px 18px 20px; background:#fff; border-top:1px solid rgba(20,35,70,.08); color:#4f566d; font-size:.86rem; line-height:1.6; }
.ill-info strong{ display:block; margin-bottom:10px; color:#16233f; font-size:.95rem; }
.hidden{display:none;}

.info-body{ padding:16px 20px 22px; font-size:.84rem; }
.info-body dt{ color:#7a86a0; font-size:.74rem; margin-top:14px; }
.info-body dt:first-child{ margin-top:2px; }
.info-body dd{ font-weight:600; margin-top:2px; line-height:1.5; }

.gallery-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; padding:16px; }
.gallery-grid .cell{ border-radius:10px; overflow:hidden; cursor:pointer; position:relative; aspect-ratio:3/4; transition:transform .25s var(--ease); background:#e9ecf1; }
.gallery-grid .cell:hover{ transform:scale(1.05); z-index:1; box-shadow:0 12px 30px rgba(8,50,25,.3); }
.gallery-grid .cell img{ width:100%; height:100%; object-fit:cover; }
.gallery-grid .cell em{ position:absolute; left:8px; bottom:6px; right:8px; font-style:normal; font-size:.72rem; color:#fff; font-weight:600; text-shadow:0 1px 6px rgba(0,0,0,.7); }

.rich{ padding:22px 26px 28px; font-size:.9rem; line-height:1.65; }
.rich .who{ display:flex; gap:16px; align-items:center; margin-bottom:16px; }
.rich .who img{ width:64px; height:64px; border-radius:50%; object-fit:cover; box-shadow:0 4px 14px rgba(8,50,25,.2); }
.rich .who h3{ font-size:1.2rem; }
.rich .who span{ color:#7a86a0; font-size:.85rem; }
.rich p+p{ margin-top:12px; }
.rich .stats{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.rich .stats div{ flex:1; min-width:120px; padding:14px; border-radius:12px; background:rgba(31,143,78,.09); }
.rich .stats b{ display:block; font-size:1.5rem; color:var(--accent); line-height:1.1; }
.rich .stats span{ font-size:.72rem; color:#5a6678; margin-top:4px; display:block; }
.rich .contact-list{ list-style:none; margin-top:6px; }
.rich .contact-list li{ display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid rgba(20,35,70,.07); }
.rich .contact-list li .ico{ width:34px; height:34px; border-radius:9px; background:rgba(31,143,78,.12); display:grid; place-items:center; font-size:1.05rem; flex:0 0 auto; }
.rich .contact-list li a{ color:var(--accent); font-weight:600; text-decoration:none; word-break:break-all; }
.rich .contact-list li a:hover{ text-decoration:underline; }
.rich .contact-list li .sub{ font-size:.72rem; color:#7a86a0; }

.skills-info{ padding:8px 0 12px; font-size:.86rem; }
.skills-info .group{ padding:6px 20px; }
.skills-info .group h4{ font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:#7a86a0; margin:12px 0 8px; }
.skills-info .chip{
  display:inline-flex; align-items:center; gap:6px; margin:0 6px 6px 0; padding:7px 12px;
  border-radius:9px; background:#fff; border:1px solid rgba(20,35,70,.1); font-weight:500; font-size:.82rem;
  transition:transform .2s var(--ease), border-color .2s, background .2s;
}
.skills-info .chip:hover{ transform:translateY(-2px); border-color:var(--accent); background:rgba(31,143,78,.06); }
.skills-info .chip .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); }

.dock-wrap{ position:absolute; bottom:12px; left:50%; transform:translateX(-50%); z-index:450; }
.dock{
  display:flex; align-items:flex-end; gap:10px; padding:9px 12px; border-radius:22px;
  background:rgba(255,255,255,.22); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.35); box-shadow:0 16px 40px rgba(8,50,25,.3);
}
.dock .app{
  width:48px; height:48px; border-radius:12px; position:relative; display:grid; place-items:center; font-size:1.5rem;
  transform-origin:bottom center; will-change:transform;
  box-shadow:0 6px 16px rgba(8,50,25,.25), inset 0 1px 0 rgba(255,255,255,.55);
}
.dock .app i{ font-style:normal; }
.dock .app::after{ content:""; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.9); opacity:0; transition:opacity .2s; }
.dock .app.running::after{ opacity:1; }
.dock .app .tip{
  position:absolute; bottom:calc(100% + 12px); left:50%; transform:translateX(-50%);
  background:rgba(15,40,25,.88); color:#fff; font-size:.68rem; font-weight:500; padding:4px 9px; border-radius:7px;
  white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s;
}
.dock .app:hover .tip{ opacity:1; }
.dock .app svg{ width:22px; height:22px; }

/* ── Startanimatie: achtergrond staat al, alleen iconen + dock sliden/faden in ── */
.intro-hidden{ opacity:0; }

@media(max-width:740px){
  .menubar .right a:not(:first-child){ display:none; }
  .widget{ width:min(300px,80%); }
}

/* ── MOBIELE MODUS (telefoon) ── */
@media(max-width:640px){
  /* menubalk: toon alle links compact zodat navigatie werkt */
  .menubar{ height:30px; padding:0 10px; font-size:.72rem; }
  .menubar .right{ gap:11px; }
  .menubar .right a:not(:first-child){ display:inline; }
  .menubar .clock{ display:none; }

  /* profiel-widget compacter en bovenaan */
  .widget{ top:40px; left:12px; right:12px; width:auto; padding:14px 16px 16px; }
  .profile-bubble{ top:38px; left:12px; }
  /* sluitknop altijd zichtbaar op touch (geen hover beschikbaar) */
  .widget-close{ opacity:1; }

  /* desktop-iconen compacter zodat ze passen */
  .dicon{ width:74px; font-size:.7rem; }
  .dicon .ic, .folder, .doc{ transform:scale(.85); }
  /* herpositioneer iconen onder de widget in een net raster (overschrijft inline posities) */
  .dicon{ top:auto !important; }
  .dicon[data-open="gallery"]{ left:6% !important; right:auto !important; top:255px !important; }
  .dicon[data-project="bungehuis"]{ left:38% !important; right:auto !important; top:255px !important; }
  .dicon[data-project="actnow"]{ left:70% !important; right:auto !important; top:255px !important; }
  .dicon[data-project="goldenroast-dash"]{ left:6% !important; right:auto !important; top:355px !important; }
  .dicon[data-project="olami"]{ left:38% !important; right:auto !important; top:355px !important; }
  .dicon[data-open="credits"]{ left:70% !important; right:auto !important; top:355px !important; }

  /* VENSTERS: vaste, gecentreerde, schermvullende layout binnen het scherm.
     Overschrijft de drag-posities uit JS (vandaar !important).
     top 64px laat de menubalk + ademruimte vrij, bottom ~96px houdt het dock vrij. */
  .window{
    left:12px !important; right:12px !important;
    top:64px !important;
    width:auto !important;
    max-width:none !important;
    max-height:calc(100% - 160px) !important;
    height:auto !important;
  }
  /* meerdere vensters stapelen netjes: kleine offset per extra venster vermijden we,
     focus regelt zichtbaarheid via z-index (laatst geopende bovenop) */

  /* grids naar één kolom */
  .proj-cols, .proj-row{ grid-template-columns:1fr 64px; }
  .proj-cols span:nth-child(2), .proj-row .dim:nth-of-type(1){ display:none; }
  .prev-multi{ grid-template-columns:1fr; }
  .gallery-grid{ grid-template-columns:repeat(2,1fr); }

  /* preview-beelden niet te hoog op mobiel */
  .prev-art img, .prev-art video{ max-height:54vh; }

  /* rich text iets compacter */
  .rich{ padding:18px 18px 22px; font-size:.88rem; }
  .rich .stats div{ min-width:100px; }

  /* dock compacter en gecentreerd, sluit strak om de iconen (zoals desktop) */
  .dock-wrap{ bottom:10px; left:50%; right:auto; transform:translateX(-50%); }
  .dock{ justify-content:center; gap:6px; padding:7px 9px; }
  .dock .app{ width:42px; height:42px; font-size:1.25rem; }
  .dock .app svg{ width:19px; height:19px; }
  /* geen hover-magnification op touch; tips niet nodig */
  .dock .app .tip{ display:none; }
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{ animation-duration:.001s !important; transition-duration:.001s !important; }
  #scene{ opacity:1 !important; }
  .intro-hidden{ opacity:1 !important; }
}
</style>
</head>
<body>

<div id="scene">
  <div id="mac">
    <div class="wallpaper">
      <div class="aurora au-1"></div><div class="aurora au-2"></div><div class="aurora au-3"></div>
    </div>

    <!-- menu bar -->
    <div class="menubar">
      <span class="left"><img class="logo" src="assets/favicon.png" alt="DJP" style="height:15px;border-radius:3px"> DJP Design</span>
      <nav class="right">
        <a href="#" data-open="projects">Projecten</a>
        <a href="#" data-open="gallery">Illustraties</a>
        <a href="#" data-open="about">Over</a>
        <a href="#" data-open="visie">Visie</a>
        <a href="#" data-open="contact">Contact</a>
        <span class="clock" id="clock">--:--</span>
      </nav>
    </div>

    <!-- profiel-widget -->
    <div class="widget" id="widget">
      <button class="widget-close" id="widgetClose" aria-label="Sluiten">✕</button>
      <img class="avatar" src="assets/profile.png" alt="Daniël Prins" />
      <h2>Daniël Prins - Designer</h2>
      <p>Communication &amp; Multimedia Design student met een passie voor tech, vormgeving en mensen.</p>
      <div class="status">Open voor freelance werk</div>
    </div>
    <!-- profiel-bubble: opent de widget weer (standaard verborgen) -->
    <button class="profile-bubble" id="profileBubble" aria-label="Profiel tonen">
      <img src="assets/profile.png" alt="Daniël Prins" />
    </button>

    <!-- desktop iconen: mappen (zoals echte desktop) -->
    <div class="dicon intro-hidden" style="left:9%; top:18%" data-open="gallery">
      <span class="ic"><span class="folder"><span class="tab"></span><span class="back"></span><span class="front"></span></span></span>
      <span class="lbl">Illustraties</span>
    </div>
    <div class="dicon intro-hidden" style="left:9%; top:48%" data-project="bungehuis">
      <span class="ic"><span class="folder"><span class="tab"></span><span class="back"></span><span class="front"></span></span></span>
      <span class="lbl">Bungehuis</span>
    </div>
    <div class="dicon intro-hidden" style="left:34%; top:16%" data-project="actnow">

/* ─────────────────────────────────────────────────────────────

let zTop = 20;
const open = new Map();

function createWindow({ key, title, html, x, y, w, dark=false, tools="" }) {
  if (open.has(key)) { focusWin(open.get(key)); return open.get(key); }
  const el = document.createElement("section");
  el.className = "window" + (dark ? " dark" : "");
  el.style.width = typeof w === "number" ? w + "px" : w;
  el.innerHTML = `
    <div class="titlebar">
      <div class="lights">
        <button class="l-close" aria-label="Sluiten"><span>✕</span></button>
        <button class="l-min" aria-label="Minimaliseren"><span>−</span></button>
        <button class="l-max" aria-label="Zoom"><span>+</span></button>
      </div>
      <span class="t-title">${title}</span>
      <div class="t-tools">${tools}</div>
    </div>
    <div class="win-body">${html}</div>`;
  windowsRoot.appendChild(el);

  const mw = mac.clientWidth, mh = mac.clientHeight;
  el.style.left = clamp(x, 8, Math.max(8, mw - el.offsetWidth - 8)) + "px";
  el.style.top  = clamp(y, 40, mh - 80) + "px";
  focusWin(el); open.set(key, el);
  if (!prefersReduced) gsap.from(el, { scale:.85, opacity:0, y:18, duration:.45, ease:"back.out(1.6)" });

  el.querySelector(".l-close").addEventListener("click", () => closeWin(key));
  el.querySelector(".l-min").addEventListener("click", () => {
    gsap.to(el, { scale:.1, y:mh, opacity:0, duration:.45, ease:"power3.in", onComplete:()=>closeWin(key,true) });
  });
  let maxed=null;
  el.querySelector(".l-max").addEventListener("click", () => {
    if(!maxed){ maxed={l:el.style.left,t:el.style.top,w:el.style.width,h:el.style.height};
      gsap.to(el,{left:10,top:40,width:mac.clientWidth-20,height:mac.clientHeight-110,duration:.4,ease:"power3.inOut"});
    } else { gsap.to(el,{left:maxed.l,top:maxed.t,width:maxed.w,height:maxed.h||"auto",duration:.4,ease:"power3.inOut",
      onComplete:()=>{el.style.height=maxed.h||""; maxed=null;}}); }
  });

  const bar = el.querySelector(".titlebar");
  bar.addEventListener("pointerdown", (e) => {
    if (e.target.closest("button")) return;
    focusWin(el);
    const sx=e.clientX, sy=e.clientY, ol=parseFloat(el.style.left), ot=parseFloat(el.style.top);
    bar.setPointerCapture(e.pointerId);
    const move=(ev)=>{ el.style.left=clamp(ol+ev.clientX-sx,-el.offsetWidth*.5,mac.clientWidth-60)+"px";
                       el.style.top =clamp(ot+ev.clientY-sy,34,mac.clientHeight-60)+"px"; };
    const up=()=>{ bar.removeEventListener("pointermove",move); bar.removeEventListener("pointerup",up); };
    bar.addEventListener("pointermove",move); bar.addEventListener("pointerup",up);
  });
  el.addEventListener("pointerdown", () => focusWin(el));
  return el;
}
function focusWin(el){ document.querySelectorAll(".window").forEach(w=>w.classList.remove("focused")); el.classList.add("focused"); el.style.zIndex=++zTop; }
function closeWin(key,skip=false){ const el=open.get(key); if(!el)return; open.delete(key); markRunning();
  if(skip||prefersReduced){el.remove();return;} gsap.to(el,{scale:.85,opacity:0,duration:.25,ease:"power2.in",onComplete:()=>el.remove()}); }
function markRunning(){ document.querySelectorAll(".dock .app").forEach(a=>{
  a.classList.toggle("running", open.has(a.dataset.open) || (a.dataset.open==="projects" && (open.has("preview")||open.has("info"))) || (a.dataset.open==="gallery" && open.has("ill-view"))); }); }

      <span class="dim">${p.role}</span><span class="dim">${p.year}</span>
    </div>`).join("");
  const el = createWindow({ key:"projects", title:"Projecten", w:Math.min(620,mac.clientWidth*.66),

    tools:`<button title="Lijst">☰</button>`,

    openPreview(PROJECTS.findIndex(p=>p.id===r.dataset.id)); highlightRow(r.dataset.id); }));

}
function highlightRow(id){ const w=open.get("projects"); if(!w)return;

function previewInner(p){
  if (p.comingSoon)
    return `<div class="prev-art" style="min-height:280px;flex-direction:column;gap:10px;color:#7a86a0;font-weight:600">
      <div style="font-size:2.4rem">🚧</div><div>Binnenkort beschikbaar</div></div>`;
  // link-balk: live site of figma (live site krijgt voorrang)
  const linkBar = p.link
    ? `<div class="prev-figma">🔗 Bekijk de live site: <a href="${p.link}" target="_blank" rel="noopener">${p.name} →</a></div>`
    : (p.figma ? `<div class="prev-figma">🔗 Bekijk het volledige project in <a href="${p.figma}" target="_blank" rel="noopener">Figma →</a></div>` : "");
  if (p.video)
    return `<div class="prev-art"><video src="${p.video}" poster="${p.poster||''}" controls playsinline preload="metadata"></video></div>${linkBar}`;
  if (p.img && p.img.length>1)
    return `<div class="prev-multi">${p.img.slice(0,4).map(s=>`<div class="prev-art"><img src="${s}" loading="lazy" alt="${p.name}"></div>`).join("")}</div>${linkBar}`;
  return `<div class="prev-art"><img src="${p.img[0]}" loading="lazy" alt="${p.name}"></div>${linkBar}`;
}

function openPreview(idx=currentIdx){

    exists.querySelector(".t-title").textContent = p.name;

    const video = body.querySelector("video");
    if(video){ video.muted = false; video.volume = 1; }
    if(!prefersReduced) gsap.from(body.firstElementChild,{opacity:0,scale:1.02,duration:.4,ease:"power2.out"});
    focusWin(exists);
  } else {
    const el = createWindow({ key:"preview", title:p.name, w:Math.min(520,mac.clientWidth*.56),

      tools:`<button data-info title="Info">ⓘ</button>`, html });

    nav.querySelector("[data-prev]").addEventListener("click",()=>{openPreview(currentIdx-1);syncInfo();highlightRow(PROJECTS[currentIdx].id);});
    nav.querySelector("[data-next]").addEventListener("click",()=>{openPreview(currentIdx+1);syncInfo();highlightRow(PROJECTS[currentIdx].id);});
    el.querySelector("[data-info]").addEventListener("click",()=>open.has("info")?closeWin("info"):openInfo());
  }
  syncInfo(); markRunning();
}

function syncInfo(){ const w=open.get("info"); if(!w)return; w.querySelector(".win-body").innerHTML=infoHtml(PROJECTS[currentIdx]); }
const illInfoHtml = (il)=>`

function syncIllInfo(){ const w=open.get("ill-info"); if(!w)return; w.querySelector(".win-body").innerHTML=illInfoHtml(ILLUSTRATIONS[illIdx]); }
function openIllInfo(){ const il=ILLUSTRATIONS[illIdx]; if(open.has("ill-info")){ closeWin("ill-info"); return; } createWindow({ key:"ill-info", title:"Info", w:300, x:mac.clientWidth*.64, y:120, html:illInfoHtml(il) }); markRunning(); }

function openGallery(){
  const cells = ILLUSTRATIONS.map((il,i)=>`<div class="cell" data-i="${i}"><img src="${il.img}" loading="lazy" alt="${il.t}"><em>${il.t}</em></div>`).join("");
  const el = createWindow({ key:"gallery", title:"Illustraties", w:Math.min(680,mac.clientWidth*.74),
    x:mac.clientWidth*.12, y:80, html:`<div class="gallery-grid">${cells}</div>` });
  el.querySelectorAll(".cell").forEach(c=>c.addEventListener("click",()=>openIllView(+c.dataset.i)));
  markRunning();
}
let illIdx=0;
function openIllView(i=0){
  illIdx=(i+ILLUSTRATIONS.length)%ILLUSTRATIONS.length;
  const il=ILLUSTRATIONS[illIdx];
  const exists=open.get("ill-view");
  const html=`<div class="prev-art"><img src="${il.img}" loading="lazy" alt="${il.t}"></div>`;
  if(exists){
    exists.querySelector(".t-title").textContent=il.t;
    const b=exists.querySelector(".win-body"); b.innerHTML=html;
    if(!exists.querySelector("[data-info]")){
      const infoButton=document.createElement("button");
      infoButton.setAttribute("data-info","");
      infoButton.title="Info";
      infoButton.textContent="ⓘ";
      exists.querySelector(".t-tools").appendChild(infoButton);
      infoButton.addEventListener("click",()=>openIllInfo());
    }
    if(!prefersReduced) gsap.from(b.firstElementChild,{opacity:0,scale:1.02,duration:.4});
    focusWin(exists);
  } else {
    const el=createWindow({ key:"ill-view", title:il.t, w:Math.min(440,mac.clientWidth*.5), x:mac.clientWidth*.36, y:90, tools:`<button data-info title="Info">ⓘ</button>`, html });
    const nav=document.createElement("div"); nav.className="prev-nav";
    nav.innerHTML=`<button data-prev>‹</button><button data-next>›</button>`;
    el.querySelector(".lights").after(nav);
    nav.querySelector("[data-prev]").addEventListener("click",()=>openIllView(illIdx-1));
    nav.querySelector("[data-next]").addEventListener("click",()=>openIllView(illIdx+1));
    el.querySelector("[data-info]").addEventListener("click",()=>openIllInfo());
  }
  syncIllInfo();
  markRunning();
}

function openVisie(){
  createWindow({ key:"visie", title:"Mijn visie op design - Notities", w:Math.min(620,mac.clientWidth*.72), x:mac.clientWidth*.2, y:60,
    html:`<div class="rich">
      <h3 style="margin-bottom:2px">Mijn visie op design</h3>
      <p style="color:#7a86a0;font-size:.8rem;margin-top:0;text-transform:uppercase;letter-spacing:.05em">Visie op het vakgebied</p>
      <p>Voor mij begint goed interface-design bij de gebruiker. Een ontwerp moet intuïtief aanvoelen: je hoeft niet na te denken over hóe iets werkt, het werkt gewoon. De grootste uitdaging, en het mooiste deel van mijn vak, is om complexe informatie eenvoudig te maken. Iets ingewikkelds terugbrengen tot iets dat meteen klopt, daar doe ik het voor.</p>
      <p>Mijn werk wordt gestuurd door vier waarden: toegankelijkheid, duidelijkheid, creativiteit en betrokkenheid. Een ontwerp moet voor iedereen te begrijpen zijn, maar het hoeft daarom niet saai te zijn. Mooi en functioneel sluiten elkaar niet uit. De beste ontwerpen zijn allebei tegelijk.</p>
      <p>Ik geloof dat visueel design meer kan dan informatie overbrengen. Het beïnvloedt gedrag en keuzes, maakt verhalen tastbaar en kan emoties oproepen die mensen aanzetten tot nadenken of actie. Juist daarom kan design ook maatschappelijk iets betekenen: het creëert bewustwording rond onderwerpen die ertoe doen. In mijn werk over antisemitisme in Nederland heb ik gezien hoe losse feiten, samengebracht in één visuele ervaring, ineens binnenkomen op een manier die tekst alleen niet voor elkaar krijgt.</p>
      <p>Als designer wil ik ontwerpen maken die iets losmaken. Werk dat complexe problemen begrijpelijk maakt, functionaliteit combineert met een sterke visuele ervaring, en zowel mooi als betekenisvol is. En ik wil blijven experimenteren met nieuwe technieken en technologieën, zodat mijn werk blijft verrassen.</p>
    </div>` });
  markRunning();
}

const APPS = { projects:openProjects, gallery:openGallery, about:openAbout, visie:openVisie, skills:openSkills, credits:openCredits, contact:openContact };

document.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",(e)=>{ e.preventDefault(); APPS[b.dataset.open]?.(); bounce(b); }));

/* profiel-widget: in-/uitklappen via sluitknop en bubble */
const widgetClose = document.getElementById("widgetClose");
const profileBubble = document.getElementById("profileBubble");
if(widgetClose) widgetClose.addEventListener("click", ()=>{
  document.body.classList.add("widget-collapsed");
  if(!prefersReduced) gsap.from(profileBubble, { scale:0, opacity:0, duration:.4, ease:"back.out(1.8)" });
});
if(profileBubble) profileBubble.addEventListener("click", ()=>{
  document.body.classList.remove("widget-collapsed");
  if(!prefersReduced) gsap.from("#widget", { scale:.9, opacity:0, y:-10, duration:.4, ease:"back.out(1.5)" });
});

/* ─────────────────────────────────────────────────────────────
   4. DOCK - magnification + bounce
   ───────────────────────────────────────────────────────────── */
const dock=document.getElementById("dock");
const apps=[...dock.querySelectorAll(".app")];
if(isFine && !prefersReduced){
  dock.addEventListener("mousemove",(e)=>{ apps.forEach(a=>{ const r=a.getBoundingClientRect();
    const d=Math.abs(e.clientX-(r.left+r.width/2)); const s=clamp(1.5-d/130,1,1.5);
    a.style.transform=`scale(${s}) translateY(${-(s-1)*10}px)`; }); });
  dock.addEventListener("mouseleave",()=>apps.forEach(a=>a.style.transform="scale(1)"));
}
function bounce(el){ if(!el.classList.contains("app")||prefersReduced)return;
  gsap.fromTo(el,{y:0},{y:-16,duration:.18,yoyo:true,repeat:3,ease:"power1.inOut",clearProps:"y"}); }

/* ─────────────────────────────────────────────────────────────
   5. STARTUP - achtergrond staat al; iconen + dock sliden/faden in
   ───────────────────────────────────────────────────────────── */
function start(){
  const icons = document.querySelectorAll(".dicon");
  const dockWrap = document.querySelector(".dock-wrap");
  if(prefersReduced){
    icons.forEach(i=>i.classList.remove("intro-hidden"));
    dockWrap.classList.remove("intro-hidden");
    return;
  }
  // verwijder de start-opacity zodra GSAP de from-animatie overneemt
  icons.forEach(i=>i.classList.remove("intro-hidden"));
  dockWrap.classList.remove("intro-hidden");

  const tl = gsap.timeline();
  tl.from(icons, { y:34, opacity:0, duration:.6, ease:"power3.out", stagger:.08, delay:.15 })
    .from(dockWrap, { y:70, opacity:0, duration:.7, ease:"back.out(1.4)" }, "-=.35");
}

/* clock */
const clock=document.getElementById("clock");
const tick=()=>clock.textContent=new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});
tick(); setInterval(tick,10000);

addEventListener("resize",()=>{ open.forEach(el=>{
  el.style.left=clamp(parseFloat(el.style.left),0,mac.clientWidth-80)+"px";
  el.style.top =clamp(parseFloat(el.style.top),34,mac.clientHeight-60)+"px"; }); });

start();
})();
